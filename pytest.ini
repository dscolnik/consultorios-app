[pytest]
addopts = 
    --strict-markers
    --tb=short
    -v
    --capture=no
markers =
    smoke: Pruebas críticas del core (ej: Login, Ver Agenda).
    functional: Flujos completos de negocio del consultorio.
    performance: Pruebas con medición de tiempos de carga (Frontend).
    security: Validación de RBAC y acceso a URLs restringidas.
    regression: Suite completa para validar cambios nuevos.
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S
testpaths = tests
python_files = test_*.py